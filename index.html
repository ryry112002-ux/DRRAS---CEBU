<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief and Emergency Resource Allocation System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .hide { display: none !important; }
        .active-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .btn-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 min-h-screen flex flex-col">

    <!-- NAVIGATION -->
    <nav class="glass sticky top-0 z-50 border-b border-slate-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer group" onclick="navigateTo('landing')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg group-hover:scale-110 transition-transform">
                    <i data-lucide="shield-alert"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tight leading-none text-slate-800">Cebu Relief</h1>
                    <p class="text-[9px] uppercase font-black text-blue-500 tracking-[0.2em] mt-1">Resource System</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4" id="nav-actions">
                <!-- Buttons injected via JS -->
            </div>
        </div>
    </nav>

    <!-- MAIN VIEW -->
    <main class="max-w-7xl mx-auto px-6 py-8 flex-1 w-full" id="main-view">
        <div class="flex flex-col items-center justify-center py-40 text-center space-y-4">
            <div class="w-12 h-12 border-4 border-blue-100 border-t-blue-600 rounded-full animate-spin"></div>
            <p class="text-slate-500 font-medium animate-pulse">Syncing with Cebu Emergency Network...</p>
        </div>
    </main>

    <!-- FOOTER -->
    <footer class="py-12 border-t border-slate-200 mt-auto bg-white">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <p class="text-slate-400 text-sm font-semibold">© 2024 Disaster Relief and Emergency Resource Allocation System</p>
            <p class="text-slate-300 text-[10px] uppercase tracking-widest mt-2">Connecting Communities in Cebu, Philippines</p>
        </div>
    </footer>

    <!-- MODAL CONTAINER -->
    <div id="modal-container" class="fixed inset-0 z-[60] hide"></div>

    <!-- FIREBASE INTEGRATION -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";

        // CONFIGURATION: Using your drras-cebu credentials
        const firebaseConfig = {
            apiKey: "AIzaSyC7N_nfJt3ceLZjbXQy4PExU762iu1pH7g",
            authDomain: "drras-cebu.firebaseapp.com",
            projectId: "drras-cebu",
            storageBucket: "drras-cebu.firebasestorage.app",
            messagingSenderId: "1097948724523",
            appId: "1:1097948724523:web:f9c9876d0336fe5486196e",
            measurementId: "G-C8M1CVV1J7",
            databaseURL: "https://drras-cebu-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Constants
        const CEBU_LOCATIONS = {
            cities: ["Cebu City", "Mandaue City", "Lapu-Lapu City", "Talisay City", "Toledo City"],
            municipalities: ["Consolacion", "Liloan", "Minglanilla", "Cordova", "Compostela"]
        };

        const ROLES = {
            BARANGAY: 'Barangay Relief Officer',
            ADMIN: 'Admin',
            LOGISTICS: 'Delivery/Logistics Officer',
            DONOR: 'Donor'
        };

        // State
        let currentUser = null;
        let currentUserData = null;
        let publicRequests = [];

        // App Start
        async function init() {
            lucide.createIcons();
            
            // Auth Listener
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    onValue(ref(db, 'users/' + user.uid), (snap) => {
                        if (snap.exists()) {
                            currentUserData = snap.val();
                            navigateTo('dashboard');
                        } else {
                            navigateTo('landing');
                        }
                        updateNavbar();
                    }, { onlyOnce: true });
                } else {
                    currentUser = null;
                    currentUserData = null;
                    navigateTo('landing');
                    updateNavbar();
                }
            });

            // Public Needs Stream
            onValue(ref(db, 'requests'), (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    publicRequests = Object.keys(data)
                        .map(k => ({ id: k, ...data[k] }))
                        .filter(r => r.status === 'pending' || r.status === 'approved')
                        .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0))
                        .slice(0, 6);
                } else {
                    publicRequests = [];
                }
                if (document.getElementById('live-radar')) renderLiveRadar();
            });
        }

        function updateNavbar() {
            const container = document.getElementById('nav-actions');
            if (currentUser && currentUserData) {
                container.innerHTML = `
                    <div class="hidden md:flex flex-col items-end mr-2">
                        <span class="text-[9px] font-black text-blue-500 uppercase leading-none">${currentUserData.role}</span>
                        <span class="text-sm font-bold text-slate-800">${currentUserData.name}</span>
                    </div>
                    <button id="btn-logout" class="p-2.5 bg-slate-50 text-slate-400 hover:text-red-500 rounded-xl transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                `;
                document.getElementById('btn-logout').onclick = () => signOut(auth);
            } else {
                container.innerHTML = `
                    <button onclick="navigateTo('auth', 'login')" class="text-sm font-bold text-slate-500 px-4 py-2 hover:bg-slate-100 rounded-xl">Login</button>
                    <button onclick="navigateTo('auth', 'signup')" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg shadow-blue-100 btn-hover">Join Network</button>
                `;
            }
            lucide.createIcons();
        }

        function navigateTo(view, mode = null) {
            if (view === 'landing') renderLanding();
            else if (view === 'auth') renderAuth(mode);
            else if (view === 'dashboard') renderDashboard();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- LANDING PAGE ---

        function renderLanding() {
            const main = document.getElementById('main-view');
            main.innerHTML = `
                <div class="space-y-24 py-12">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                        <div class="space-y-8 text-center lg:text-left">
                            <div class="inline-flex items-center gap-2 bg-blue-50 text-blue-700 px-4 py-2 rounded-full text-xs font-black uppercase tracking-widest">
                                <span class="w-2 h-2 bg-blue-600 rounded-full active-pulse"></span> Cebu Node Online
                            </div>
                            <h1 class="text-5xl lg:text-7xl font-black text-slate-900 leading-[1.1] tracking-tight text-balance">
                                Disaster Relief <br><span class="text-blue-600">Simplified.</span>
                            </h1>
                            <p class="text-lg text-slate-500 max-w-lg leading-relaxed mx-auto lg:mx-0 font-medium">
                                A specialized system for Cebu Province. Real-time resource coordination between local officials, donors, and logistics providers.
                            </p>
                            <div class="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                                <button onclick="navigateTo('auth', 'signup')" class="bg-blue-600 text-white px-10 py-5 rounded-2xl font-black text-lg shadow-2xl shadow-blue-200 btn-hover">Start Deployment</button>
                                <button onclick="document.getElementById('radar-section').scrollIntoView({behavior:'smooth'})" class="bg-white border-2 border-slate-200 px-10 py-5 rounded-2xl font-black text-slate-600 text-lg btn-hover">View Needs</button>
                            </div>
                        </div>
                        
                        <div class="relative cursor-pointer group" onclick="openMap()">
                            <div class="absolute -inset-4 bg-blue-600/10 rounded-[3rem] blur-3xl opacity-50"></div>
                            <div class="relative bg-slate-900 rounded-[3rem] aspect-video flex items-center justify-center border-4 border-white shadow-2xl overflow-hidden">
                                <div class="text-center space-y-4 z-10 p-10">
                                    <div class="w-20 h-20 bg-blue-500/20 rounded-[2rem] mx-auto flex items-center justify-center text-blue-400 border border-blue-500/30 animate-bounce">
                                        <i data-lucide="map" class="w-10 h-10"></i>
                                    </div>
                                    <h3 class="text-white font-black text-xl">Cebu Situation Radar</h3>
                                    <p class="text-blue-400 text-[10px] font-black uppercase tracking-[0.4em]">Expand Interactive Map</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <section id="radar-section" class="space-y-10 scroll-mt-24">
                        <div class="flex flex-col md:flex-row justify-between items-end gap-4">
                            <div>
                                <h2 class="text-4xl font-black text-slate-800 flex items-center gap-3">
                                    <i data-lucide="activity" class="text-red-500 active-pulse"></i> Live Relief Radar
                                </h2>
                                <p class="text-slate-500 mt-2 font-medium">Real-time urgent needs validated by barangay officers</p>
                            </div>
                        </div>
                        <div id="live-radar" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
                    </section>
                </div>
            `;
            renderLiveRadar();
            lucide.createIcons();
        }

        function renderLiveRadar() {
            const container = document.getElementById('live-radar');
            if (!container) return;
            if (publicRequests.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200 text-slate-400 font-bold italic tracking-tight">No active needs reported.</div>`;
                return;
            }
            container.innerHTML = publicRequests.map(req => `
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-100 border-l-8 border-l-orange-500 shadow-sm hover:shadow-xl transition-all hover:-translate-y-2">
                    <p class="text-[10px] font-black text-orange-600 uppercase tracking-widest mb-2">${req.barangay}</p>
                    <h4 class="font-black text-2xl tracking-tight text-slate-900 mb-1">${req.items}</h4>
                    <p class="text-sm text-slate-500 italic mb-8 line-clamp-2 leading-relaxed">"${req.note || 'Assist now.'}"</p>
                    <button onclick="navigateTo('auth', 'signup')" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase hover:bg-blue-600 transition-colors">Pledge Support</button>
                </div>
            `).join('');
        }

        // --- AUTH ---

        function renderAuth(mode) {
            const main = document.getElementById('main-view');
            main.innerHTML = `
                <div class="max-w-md mx-auto py-12">
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100">
                        <h2 class="text-3xl font-black text-slate-900 text-center mb-10">${mode === 'login' ? 'System Login' : 'Create Account'}</h2>
                        <form id="auth-form" class="space-y-5">
                            ${mode === 'signup' ? `
                                <input id="auth-name" placeholder="Full Name" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-4 focus:ring-blue-500/10 font-medium" required>
                                <select id="auth-role" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 font-bold">
                                    ${Object.values(ROLES).map(r => `<option value="${r}">${r}</option>`).join('')}
                                </select>
                                <select id="auth-location" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 font-bold">
                                    ${CEBU_LOCATIONS.cities.concat(CEBU_LOCATIONS.municipalities).map(l => `<option value="${l}">${l}</option>`).join('')}
                                </select>
                            ` : ''}
                            <input id="auth-email" type="email" placeholder="Email Address" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-4 focus:ring-blue-500/10 font-medium" required>
                            <input id="auth-pass" type="password" placeholder="Password" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:ring-4 focus:ring-blue-500/10 font-medium" required>
                            <button type="submit" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest mt-4 shadow-xl">
                                ${mode === 'login' ? 'Authorize Access' : 'Register Profile'}
                            </button>
                        </form>
                        <button onclick="navigateTo('auth', '${mode === 'login' ? 'signup' : 'login'}')" class="w-full text-center text-xs font-black text-blue-600 mt-8 hover:underline">
                            ${mode === 'login' ? "Request new access" : "Already registered? Login"}
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('auth-form').onsubmit = (e) => handleAuth(e, mode);
        }

        async function handleAuth(e, mode) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if (mode === 'signup') {
                    const name = document.getElementById('auth-name').value;
                    const role = document.getElementById('auth-role').value;
                    const location = document.getElementById('auth-location').value;
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, 'users/' + cred.user.uid), { uid: cred.user.uid, name, role, location, createdAt: serverTimestamp() });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) { alert(err.message); }
        }

        // --- DASHBOARD ROUTER ---

        function renderDashboard() {
            const main = document.getElementById('main-view');
            main.innerHTML = `
                <div class="space-y-10">
                    <div class="bg-white p-10 rounded-[3.5rem] border border-slate-100 flex flex-col md:flex-row items-center gap-8 shadow-sm">
                        <div class="w-20 h-20 bg-blue-600 text-white rounded-[2rem] flex items-center justify-center text-3xl font-black shadow-xl shadow-blue-200">${currentUserData.name.charAt(0)}</div>
                        <div class="flex-1 text-center md:text-left">
                            <h2 class="text-3xl font-black text-slate-900 tracking-tight">${currentUserData.name}</h2>
                            <p class="text-blue-500 font-black text-[10px] uppercase tracking-[0.4em] mt-1">${currentUserData.role} • ${currentUserData.location}</p>
                        </div>
                        <div class="px-5 py-2 bg-emerald-50 text-emerald-600 rounded-xl font-black text-[10px] uppercase flex items-center gap-2">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full active-pulse"></span> Secured Connection
                        </div>
                    </div>
                    <div id="dashboard-content" class="min-h-[500px]"></div>
                </div>
            `;
            if (currentUserData.role === ROLES.BARANGAY) renderBarangay();
            else if (currentUserData.role === ROLES.ADMIN) renderAdmin();
            else if (currentUserData.role === ROLES.LOGISTICS) renderLogistics();
            else if (currentUserData.role === ROLES.DONOR) renderDonor();
        }

        // --- DASHBOARD MODULES ---

        function renderBarangay() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="space-y-8">
                    <div class="flex justify-between items-center">
                        <h3 class="text-2xl font-black text-slate-800 tracking-tight">Barangay Relief Hub</h3>
                        <div class="flex gap-4">
                            <button onclick="openBeneModal()" class="bg-slate-900 text-white px-6 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl btn-hover">Add Beneficiary</button>
                            <button onclick="openRequestModal()" class="bg-blue-600 text-white px-8 py-3.5 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl btn-hover">New Request</button>
                        </div>
                    </div>
                    <div id="barangay-table" class="bg-white p-10 rounded-[3rem] border border-slate-100 overflow-x-auto shadow-sm"></div>
                </div>
            `;
            onValue(ref(db, 'requests'), (snapshot) => {
                const data = snapshot.val();
                const reqs = data ? Object.keys(data).map(k => ({id: k, ...data[k]})).filter(r => r.barangay === currentUserData.location) : [];
                document.getElementById('barangay-table').innerHTML = `
                    <table class="w-full text-left">
                        <thead><tr class="text-slate-400 text-[10px] font-black uppercase border-b border-slate-50"><th class="pb-5">Resource Type</th><th class="pb-5">Logistics Status</th><th class="pb-5">Action</th></tr></thead>
                        <tbody>${reqs.map(r => `
                            <tr class="border-b border-slate-50 last:border-0 hover:bg-slate-50/50 transition-colors">
                                <td class="py-6"><p class="font-black text-slate-800 text-lg">${r.items}</p><p class="text-xs text-slate-400 mt-1">${r.note || 'Official Request'}</p></td>
                                <td><span class="px-3 py-1.5 rounded-xl text-[9px] font-black uppercase ${r.status==='pending'?'bg-amber-100 text-amber-700':r.status==='dispatched'?'bg-blue-100 text-blue-700':'bg-emerald-100 text-emerald-700'}">${r.status}</span></td>
                                <td>${r.status==='dispatched'?`<button onclick="updateStatus('${r.id}', 'delivered')" class="text-blue-600 font-black text-xs hover:underline">Confirm Receipt</button>`:'-'}</td>
                            </tr>
                        `).join('') || '<tr><td colspan="3" class="py-20 text-center text-slate-300 italic">No request history found.</td></tr>'}</tbody>
                    </table>
                `;
            });
            lucide.createIcons();
        }

        function renderAdmin() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                        <h4 class="font-black text-xl text-slate-800 mb-8 flex items-center gap-3"><i data-lucide="bell" class="text-blue-500"></i> Requests for Approval</h4>
                        <div id="admin-list" class="space-y-4 max-h-[500px] overflow-y-auto pr-2"></div>
                    </div>
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                        <h4 class="font-black text-xl text-slate-800 mb-8 flex items-center gap-3"><i data-lucide="bar-chart-3" class="text-emerald-500"></i> Allocation Summary</h4>
                        <canvas id="adminChart" height="250"></canvas>
                    </div>
                </div>
            `;
            onValue(ref(db, 'requests'), (snap) => {
                const data = snap.val();
                const reqs = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
                const pending = reqs.filter(r => r.status === 'pending');
                document.getElementById('admin-list').innerHTML = pending.map(r => `
                    <div class="p-6 bg-slate-50 rounded-3xl flex justify-between items-center hover:bg-white border border-transparent hover:border-slate-100 transition-all">
                        <div><p class="font-black text-sm text-slate-800">${r.barangay}</p><p class="text-xs text-slate-500">${r.items}</p></div>
                        <button onclick="updateStatus('${r.id}', 'approved')" class="bg-blue-600 text-white px-5 py-2 rounded-xl text-xs font-black uppercase tracking-widest hover:bg-blue-700">Approve</button>
                    </div>
                `).join('') || '<p class="text-center py-20 text-slate-400 font-bold italic">Approvals queue clear.</p>';

                const labels = CEBU_LOCATIONS.cities.concat(CEBU_LOCATIONS.municipalities);
                const chartData = labels.map(l => reqs.filter(r => r.barangay === l).length);
                const ctx = document.getElementById('adminChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: { labels, datasets: [{ label: 'Total Volume', data: chartData, backgroundColor: '#3b82f6', borderRadius: 12 }] },
                    options: { responsive: true, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, grid: { display: false } } } }
                });
            });
            lucide.createIcons();
        }

        function renderLogistics() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm h-fit">
                        <h4 class="font-black text-xl text-slate-800 mb-8 flex items-center gap-3"><i data-lucide="package" class="text-blue-500"></i> Dispatch Pipeline</h4>
                        <div id="logi-list" class="space-y-4"></div>
                    </div>
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm h-fit">
                        <h4 class="font-black text-xl text-slate-800 mb-8 flex items-center gap-3"><i data-lucide="truck" class="text-orange-500"></i> Global In-Transit</h4>
                        <div id="logi-transit" class="space-y-4"></div>
                    </div>
                </div>
            `;
            onValue(ref(db, 'requests'), (snap) => {
                const data = snap.val();
                const reqs = data ? Object.keys(data).map(k => ({id:k, ...data[k]})) : [];
                document.getElementById('logi-list').innerHTML = reqs.filter(r => r.status==='approved').map(r => `
                    <div class="p-6 bg-blue-50/50 rounded-3xl border border-blue-100">
                        <p class="font-black text-slate-800">${r.barangay}</p><p class="text-xs text-slate-500 mt-1 mb-5">${r.items}</p>
                        <button onclick="updateStatus('${r.id}', 'dispatched')" class="w-full bg-blue-600 text-white py-3.5 rounded-2xl font-black text-xs uppercase tracking-widest hover:bg-blue-700 shadow-lg">Assign Dispatch</button>
                    </div>
                `).join('') || '<p class="text-center py-20 text-slate-300 font-bold italic">No approved items for dispatch.</p>';

                document.getElementById('logi-transit').innerHTML = reqs.filter(r => r.status==='dispatched').map(r => `
                    <div class="p-6 bg-orange-50/50 border border-orange-100 rounded-3xl relative overflow-hidden">
                        <p class="font-black text-slate-800">${r.barangay}</p><p class="text-xs text-slate-500 mt-1">${r.items}</p>
                        <div class="flex items-center gap-1 text-[9px] text-orange-600 font-black uppercase mt-4 tracking-widest"><i data-lucide="activity" class="w-3 h-3"></i> Tracking Active</div>
                    </div>
                `).join('') || '<p class="text-center py-20 text-slate-300 font-bold italic">Fleet idle.</p>';
            });
            lucide.createIcons();
        }

        function renderDonor() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div class="bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm h-fit">
                        <h4 class="font-black text-xl text-slate-800 mb-8">Pledge Resource</h4>
                        <div class="space-y-6">
                            <input id="don-item" placeholder="Relief Item (e.g. 50 Water Packs)" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none font-medium">
                            <input id="don-qty" type="number" placeholder="Quantity" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none font-medium">
                            <button onclick="submitDonation()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-xs uppercase shadow-xl hover:bg-blue-700 transition-all tracking-widest">Confirm Pledge</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 bg-white p-10 rounded-[3rem] border border-slate-100 shadow-sm">
                        <h4 class="font-black text-xl text-slate-800 mb-8">My Pledge Stream</h4>
                        <div id="donor-history" class="grid grid-cols-1 sm:grid-cols-2 gap-4"></div>
                    </div>
                </div>
            `;
            onValue(ref(db, 'donations'), (snap) => {
                const data = snap.val();
                const dons = data ? Object.keys(data).map(k => ({id:k, ...data[k]})).filter(d => d.donorId === currentUser.uid) : [];
                document.getElementById('donor-history').innerHTML = dons.map(d => `
                    <div class="p-6 bg-slate-50 rounded-3xl flex items-center gap-5">
                        <div class="p-3 bg-white rounded-2xl shadow-sm text-red-500"><i data-lucide="heart" class="w-5 h-5"></i></div>
                        <div><p class="font-black text-slate-800 text-lg leading-none">${d.item}</p><p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">QTY: ${d.quantity}</p></div>
                    </div>
                `).join('') || '<p class="text-center py-20 text-slate-300 font-bold italic col-span-full">Your stream is empty. Pledge now.</p>';
            });
            lucide.createIcons();
        }

        // --- HELPERS ---

        window.updateStatus = async (id, status) => {
            await update(ref(db, 'requests/' + id), { status });
        };

        window.openRequestModal = () => {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
                    <div class="bg-white w-full max-w-md rounded-[3.5rem] p-12 shadow-2xl relative">
                        <h3 class="text-3xl font-black mb-10 text-slate-900">Broadcast Need</h3>
                        <input id="mod-items" placeholder="Resource Name?" class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-200 outline-none font-medium mb-4">
                        <textarea id="mod-notes" placeholder="Reasoning..." class="w-full p-5 rounded-2xl bg-slate-50 border border-slate-200 outline-none h-28 font-medium"></textarea>
                        <div class="flex gap-4 pt-8">
                            <button onclick="closeModal()" class="flex-1 text-slate-400 font-black uppercase text-xs">Cancel</button>
                            <button onclick="submitRequest()" class="flex-1 bg-slate-900 text-white py-4 rounded-2xl font-black text-xs uppercase shadow-xl active:scale-95 transition-all">Submit</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hide');
        };

        window.openBeneModal = () => {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
                    <div class="bg-white w-full max-w-md rounded-[3.5rem] p-12 shadow-2xl relative">
                        <h3 class="text-2xl font-black mb-8 text-slate-800">New Beneficiary</h3>
                        <input id="bene-name" placeholder="Full Name of Head of Household" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none mb-4 font-medium">
                        <input id="bene-size" type="number" placeholder="Household Size" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none font-medium mb-8">
                        <div class="flex gap-4">
                            <button onclick="closeModal()" class="flex-1 text-slate-400 font-black uppercase text-[10px]">Cancel</button>
                            <button onclick="saveBene()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase shadow-xl active:scale-95 transition-all">Register</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hide');
        };

        window.submitRequest = async () => {
            const items = document.getElementById('mod-items').value;
            const note = document.getElementById('mod-notes').value;
            if (!items) return;
            await push(ref(db, 'requests'), { items, note, barangay: currentUserData.location, status: 'pending', createdAt: serverTimestamp() });
            closeModal();
        };

        window.saveBene = async () => {
            const name = document.getElementById('bene-name').value;
            const size = document.getElementById('bene-size').value;
            if (!name) return;
            await push(ref(db, 'beneficiaries'), { name, size, location: currentUserData.location, createdAt: serverTimestamp() });
            closeModal();
        };

        window.submitDonation = async () => {
            const item = document.getElementById('don-item').value;
            const quantity = document.getElementById('don-qty').value;
            if (!item || !quantity) return;
            await push(ref(db, 'donations'), { donorId: currentUser.uid, donorName: currentUserData.name, item, quantity, createdAt: serverTimestamp() });
            document.getElementById('don-item').value = ''; document.getElementById('don-qty').value = '';
        };

        window.openMap = () => {
            const modal = document.getElementById('modal-container');
            const allLocations = [...CEBU_LOCATIONS.cities, ...CEBU_LOCATIONS.municipalities];
            modal.innerHTML = `
                <div class="fixed inset-0 bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-6">
                    <div class="bg-white w-full max-w-4xl rounded-[4rem] p-12 relative shadow-2xl text-center">
                        <button onclick="closeModal()" class="absolute top-10 right-10 p-3 hover:bg-slate-50 rounded-full transition-colors"><i data-lucide="x"></i></button>
                        <h3 class="text-4xl font-black mb-12 tracking-tight text-slate-900">Cebu Situation Radar</h3>
                        <div class="grid grid-cols-2 sm:grid-cols-5 gap-4">
                            ${allLocations.map(l => {
                                const hasReq = publicRequests.some(r => r.barangay === l);
                                return `<div class="p-5 border rounded-[2.5rem] transition-all flex flex-col items-center justify-center ${hasReq?'bg-red-50 border-red-200 animate-pulse scale-[1.05] shadow-lg shadow-red-100':'bg-white border-slate-100 opacity-60'}">
                                    <div class="w-3 h-3 rounded-full mb-3 ${hasReq?'bg-red-500':'bg-emerald-500'}"></div>
                                    <p class="text-[10px] font-black uppercase text-slate-900 leading-none">${l}</p>
                                    <p class="text-[8px] font-black uppercase mt-1 tracking-widest ${hasReq?'text-red-600':'text-emerald-600'}">${hasReq?'Urgent':'Stable'}</p>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hide');
            lucide.createIcons();
        };

        window.closeModal = () => document.getElementById('modal-container').classList.add('hide');
        window.navigateTo = navigateTo;
        
        init();
    </script>
</body>
</html>
