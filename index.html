<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cebu Disaster Relief & Resource System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Chart.js for Admin Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .hide { display: none !important; }
        .active-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 min-h-screen flex flex-col">

    <!-- NAVIGATION -->
    <nav class="glass sticky top-0 z-40 border-b border-slate-100 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('landing')">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i data-lucide="shield-check"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Cebu Relief</h1>
                    <p class="text-[10px] uppercase font-black text-slate-400 tracking-widest leading-none">Resource System</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4" id="nav-actions">
                <!-- Dynamic actions injected here -->
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT AREA -->
    <main class="max-w-7xl mx-auto px-6 py-8 flex-1 w-full" id="main-view">
        <!-- Views will be injected here via JavaScript -->
    </main>

    <!-- FOOTER -->
    <footer class="py-12 border-t border-slate-200 mt-auto">
        <div class="max-w-7xl mx-auto px-6 text-center text-slate-400 text-sm">
            <p>© 2024 Cebu Disaster Relief and Emergency Resource Allocation System</p>
            <p class="mt-2">Empowering Cebuano Communities through Digital Resilience.</p>
        </div>
    </footer>

    <!-- MODALS CONTAINER -->
    <div id="modal-container" class="fixed inset-0 z-50 hide"></div>

    <!-- FIREBASE SDKS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global Constants
        const CEBU_LOCATIONS = {
            cities: ["Cebu City", "Mandaue City", "Lapu-Lapu City", "Talisay City", "Toledo City"],
            municipalities: ["Consolacion", "Liloan", "Minglanilla", "Cordova", "Compostela"]
        };

        const ROLES = {
            BARANGAY: 'Barangay Relief Officer',
            ADMIN: 'Admin',
            LOGISTICS: 'Delivery/Logistics Officer',
            DONOR: 'Donor'
        };

        // Firebase Setup
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cebu-relief-v1';
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // State Management
        let currentUser = null;
        let currentUserData = null;
        let publicRequests = [];
        let activeUnsubs = [];

        // --- APP LOGIC ---

        async function init() {
            lucide.createIcons();
            
            // Listen for Auth
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    const userDoc = await getDoc(doc(db, `artifacts/${appId}/public/data/users`, user.uid));
                    if (userDoc.exists()) {
                        currentUserData = userDoc.data();
                        navigateTo('dashboard');
                    }
                } else {
                    currentUser = null;
                    currentUserData = null;
                    navigateTo('landing');
                }
                updateNavbar();
            });

            // Handle initial token
            if (typeof __initial_auth_token !== 'undefined') {
                try { await signInWithCustomToken(auth, __initial_auth_token); } catch(e) {}
            }

            // Public Data Stream (Live Radar)
            const q = query(
                collection(db, `artifacts/${appId}/public/data/requests`), 
                where("status", "in", ["pending", "approved"]),
                orderBy("createdAt", "desc"),
                limit(6)
            );
            onSnapshot(q, (snap) => {
                publicRequests = snap.docs.map(d => ({id: d.id, ...d.data()}));
                if (document.getElementById('live-radar')) renderLiveRadar();
            });
        }

        function updateNavbar() {
            const container = document.getElementById('nav-actions');
            if (currentUser && currentUserData) {
                container.innerHTML = `
                    <div class="hidden md:block text-right mr-2">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">${currentUserData.role}</p>
                        <p class="text-sm font-semibold">${currentUserData.name}</p>
                    </div>
                    <button id="btn-logout" class="p-2 hover:bg-slate-100 rounded-xl transition-colors">
                        <i data-lucide="log-out" class="w-5 h-5 text-slate-500"></i>
                    </button>
                `;
                document.getElementById('btn-logout').onclick = () => signOut(auth);
            } else {
                container.innerHTML = `
                    <button onclick="navigateTo('auth', 'login')" class="text-sm font-medium px-4 py-2 hover:bg-slate-50 rounded-xl">Login</button>
                    <button onclick="navigateTo('auth', 'signup')" class="bg-blue-600 text-white px-4 py-2 rounded-xl font-bold shadow-md hover:bg-blue-700 transition-all">Join Network</button>
                `;
            }
            lucide.createIcons();
        }

        function navigateTo(view, mode = null) {
            const main = document.getElementById('main-view');
            // Clear previous subscriptions
            activeUnsubs.forEach(unsub => unsub());
            activeUnsubs = [];

            if (view === 'landing') renderLanding();
            else if (view === 'auth') renderAuth(mode);
            else if (view === 'dashboard') renderDashboard();
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- VIEW RENDERERS ---

        function renderLanding() {
            const main = document.getElementById('main-view');
            main.innerHTML = `
                <div class="space-y-16 py-12">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                        <div class="space-y-6">
                            <span class="px-4 py-2 bg-blue-100 text-blue-700 rounded-full text-xs font-bold uppercase tracking-wider">Serving Cebu Since 2024</span>
                            <h1 class="text-5xl lg:text-7xl font-black text-slate-900 leading-tight">Cebu Disaster <span class="text-blue-600">Relief Hub.</span></h1>
                            <p class="text-lg text-slate-500 max-w-lg">The centralized emergency resource system for Cebuano communities. Real-time coordination between Barangays, Donors, and Logistics.</p>
                            <div class="flex gap-4">
                                <button onclick="navigateTo('auth', 'signup')" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-blue-200 hover:scale-105 transition-all">Start Deployment</button>
                                <button onclick="document.getElementById('radar-section').scrollIntoView({behavior:'smooth'})" class="border-2 border-slate-200 px-8 py-4 rounded-2xl font-bold hover:bg-slate-50 transition-all">View Needs</button>
                            </div>
                        </div>
                        <div class="relative group cursor-pointer" onclick="openMap()">
                            <div class="absolute -inset-4 bg-blue-600/5 rounded-[3rem] blur-3xl"></div>
                            <div class="relative bg-slate-900 rounded-[3rem] aspect-video flex items-center justify-center overflow-hidden border border-slate-800">
                                <div class="text-center space-y-4">
                                    <div class="w-16 h-16 bg-blue-500/20 rounded-2xl mx-auto flex items-center justify-center text-blue-400 border border-blue-500/30 animate-bounce">
                                        <i data-lucide="map-pin" class="w-8 h-8"></i>
                                    </div>
                                    <p class="text-white font-bold">Open Interactive Situation Map</p>
                                    <p class="text-xs text-blue-400/60 uppercase font-black tracking-widest">Click to Expand</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <section id="radar-section" class="space-y-8">
                        <div class="flex items-center justify-between">
                            <div>
                                <h2 class="text-3xl font-bold flex items-center gap-2"><i data-lucide="activity" class="text-red-500 active-pulse"></i> Live Relief Radar</h2>
                                <p class="text-slate-500">Real-time urgent needs reported from the field across Cebu</p>
                            </div>
                        </div>
                        <div id="live-radar" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                    </section>
                </div>
            `;
            renderLiveRadar();
            lucide.createIcons();
        }

        function renderLiveRadar() {
            const container = document.getElementById('live-radar');
            if (!container) return;
            if (publicRequests.length === 0) {
                container.innerHTML = `<div class="col-span-full py-12 text-center bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200 text-slate-400">No active relief needs reported. Status stable.</div>`;
                return;
            }
            container.innerHTML = publicRequests.map(req => `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 border-l-4 border-l-orange-500 hover:shadow-md transition-all">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center gap-2">
                            <div class="p-2 bg-orange-50 text-orange-600 rounded-lg"><i data-lucide="alert-triangle" class="w-4 h-4"></i></div>
                            <div>
                                <p class="font-bold text-slate-800 leading-none">${req.barangay}</p>
                                <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Urgent</span>
                            </div>
                        </div>
                        <span class="text-[10px] font-bold text-slate-400">${req.createdAt ? new Date(req.createdAt.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : 'Now'}</span>
                    </div>
                    <h4 class="font-bold text-lg mb-1">${req.items}</h4>
                    <p class="text-sm text-slate-500 italic mb-4">"${req.note || 'No notes'}"</p>
                    <button onclick="navigateTo('auth', 'signup')" class="w-full py-2 bg-orange-500 text-white rounded-xl font-bold text-xs hover:bg-orange-600 transition-all">Pledge Help</button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function renderAuth(mode) {
            const main = document.getElementById('main-view');
            main.innerHTML = `
                <div class="max-w-md mx-auto py-12">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <div class="text-center mb-8">
                            <h2 class="text-2xl font-bold">${mode === 'login' ? 'System Login' : 'Create Account'}</h2>
                            <p class="text-slate-500 text-sm">Cebu Emergency Management Network</p>
                        </div>
                        <form id="auth-form" class="space-y-4">
                            ${mode === 'signup' ? `
                                <div><label class="text-xs font-bold text-slate-500 uppercase">Full Name</label><input id="auth-name" type="text" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                                <div><label class="text-xs font-bold text-slate-500 uppercase">Role</label>
                                    <select id="auth-role" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                                        ${Object.values(ROLES).map(r => `<option value="${r}">${r}</option>`).join('')}
                                    </select>
                                </div>
                                <div><label class="text-xs font-bold text-slate-500 uppercase">Primary Cebu Location</label>
                                    <select id="auth-location" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                                        ${CEBU_LOCATIONS.cities.concat(CEBU_LOCATIONS.municipalities).map(l => `<option value="${l}">${l}</option>`).join('')}
                                    </select>
                                </div>
                            ` : ''}
                            <div><label class="text-xs font-bold text-slate-500 uppercase">Email</label><input id="auth-email" type="email" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                            <div><label class="text-xs font-bold text-slate-500 uppercase">Password</label><input id="auth-pass" type="password" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 focus:ring-2 focus:ring-blue-500 outline-none" required></div>
                            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all mt-4">
                                ${mode === 'login' ? 'Authorize Access' : 'Register Profile'}
                            </button>
                        </form>
                        <button onclick="navigateTo('auth', '${mode === 'login' ? 'signup' : 'login'}')" class="w-full text-center text-sm font-semibold text-blue-600 mt-6 hover:underline">
                            ${mode === 'login' ? "New here? Create an account" : "Already registered? Login here"}
                        </button>
                    </div>
                </div>
            `;
            document.getElementById('auth-form').onsubmit = (e) => handleAuth(e, mode);
        }

        async function handleAuth(e, mode) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            try {
                if (mode === 'signup') {
                    const name = document.getElementById('auth-name').value;
                    const role = document.getElementById('auth-role').value;
                    const loc = document.getElementById('auth-location').value;
                    const cred = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, `artifacts/${appId}/public/data/users`, cred.user.uid), {
                        uid: cred.user.uid, name, role, location: loc, createdAt: serverTimestamp()
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, pass);
                }
            } catch (err) {
                alert(err.message);
            }
        }

        // --- DASHBOARDS ---

        function renderDashboard() {
            const main = document.getElementById('main-view');
            main.innerHTML = `
                <div class="space-y-8">
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col md:flex-row items-center gap-6">
                        <div class="w-16 h-16 bg-blue-600 text-white rounded-2xl flex items-center justify-center text-2xl font-black">${currentUserData.name.charAt(0)}</div>
                        <div class="flex-1 text-center md:text-left">
                            <h2 class="text-2xl font-bold">Welcome, ${currentUserData.name}</h2>
                            <p class="text-slate-500 font-medium">${currentUserData.role} • ${currentUserData.location}</p>
                        </div>
                        <div class="px-4 py-2 bg-emerald-50 text-emerald-600 rounded-xl font-bold text-xs flex items-center gap-2">
                            <span class="w-2 h-2 bg-emerald-500 rounded-full active-pulse"></span> SYSTEM ONLINE
                        </div>
                    </div>
                    <div id="dashboard-content"></div>
                </div>
            `;

            if (currentUserData.role === ROLES.BARANGAY) renderBarangay();
            else if (currentUserData.role === ROLES.ADMIN) renderAdmin();
            else if (currentUserData.role === ROLES.LOGISTICS) renderLogistics();
            else if (currentUserData.role === ROLES.DONOR) renderDonor();
        }

        function renderBarangay() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-bold">Relief Operations Hub</h3>
                        <button onclick="openRequestModal()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> New Request</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="barangay-stats"></div>
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100">
                        <h4 class="font-bold mb-6">Recent Relief Logs</h4>
                        <div class="overflow-x-auto"><table class="w-full text-left" id="barangay-table"></table></div>
                    </div>
                </div>
            `;
            
            const q = query(collection(db, `artifacts/${appId}/public/data/requests`), where("barangay", "==", currentUserData.location));
            const unsub = onSnapshot(q, (snap) => {
                const reqs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                
                document.getElementById('barangay-stats').innerHTML = `
                    <div class="bg-blue-50 p-6 rounded-3xl"><p class="text-blue-600 font-bold text-xs uppercase">Pending</p><h5 class="text-3xl font-black">${reqs.filter(r=>r.status==='pending').length}</h5></div>
                    <div class="bg-orange-50 p-6 rounded-3xl"><p class="text-orange-600 font-bold text-xs uppercase">Dispatched</p><h5 class="text-3xl font-black">${reqs.filter(r=>r.status==='dispatched').length}</h5></div>
                    <div class="bg-emerald-50 p-6 rounded-3xl"><p class="text-emerald-600 font-bold text-xs uppercase">Fulfilled</p><h5 class="text-3xl font-black">${reqs.filter(r=>r.status==='delivered').length}</h5></div>
                `;

                document.getElementById('barangay-table').innerHTML = `
                    <thead><tr class="text-slate-400 text-xs border-b"><th class="pb-3">Items</th><th class="pb-3">Status</th><th class="pb-3">Action</th></tr></thead>
                    <tbody>${reqs.map(r => `
                        <tr class="border-b last:border-0"><td class="py-4"><p class="font-bold">${r.items}</p><p class="text-xs text-slate-400">${r.note || ''}</p></td>
                        <td><span class="px-2 py-1 rounded text-[10px] font-bold uppercase ${r.status==='pending'?'bg-yellow-100 text-yellow-700':'bg-emerald-100 text-emerald-700'}">${r.status}</span></td>
                        <td>${r.status === 'dispatched' ? `<button onclick="updateReq('${r.id}', 'delivered')" class="text-xs font-bold text-blue-600 hover:underline">Confirm Receipt</button>` : '-'}</td></tr>
                    `).join('')}</tbody>
                `;
            });
            activeUnsubs.push(unsub);
            lucide.createIcons();
        }

        window.updateReq = async (id, status) => {
            await updateDoc(doc(db, `artifacts/${appId}/public/data/requests`, id), { status });
        };

        window.openRequestModal = () => {
            const modal = document.getElementById('modal-container');
            modal.innerHTML = `
                <div class="flex items-center justify-center min-h-screen p-4">
                    <div class="bg-white w-full max-w-md rounded-[2rem] p-8 shadow-2xl">
                        <h3 class="text-xl font-bold mb-4">Request Supplies</h3>
                        <div class="space-y-4">
                            <input id="mod-items" placeholder="e.g. 500 Rice Packs" class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 outline-none">
                            <textarea id="mod-notes" placeholder="Urgency, specifics..." class="w-full p-3 rounded-xl border border-slate-200 bg-slate-50 outline-none h-24"></textarea>
                            <div class="flex gap-2">
                                <button onclick="closeModal()" class="flex-1 py-3 font-bold text-slate-400">Cancel</button>
                                <button onclick="submitRequest()" class="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold">Submit</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hide');
        };

        window.submitRequest = async () => {
            const items = document.getElementById('mod-items').value;
            const note = document.getElementById('mod-notes').value;
            if (!items) return;
            await addDoc(collection(db, `artifacts/${appId}/public/data/requests`), {
                items, note, barangay: currentUserData.location, status: 'pending', createdAt: serverTimestamp()
            });
            closeModal();
        };

        function renderAdmin() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <h4 class="font-bold mb-4">Distribution Analytics</h4>
                        <canvas id="adminChart" height="200"></canvas>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100">
                        <h4 class="font-bold mb-4">Urgent Approvals</h4>
                        <div id="admin-approvals" class="space-y-3 max-h-[300px] overflow-y-auto"></div>
                    </div>
                    <div class="col-span-full bg-slate-900 p-8 rounded-[2rem] text-white">
                        <h4 class="font-bold mb-4">Global Donation Stream</h4>
                        <div id="admin-donations" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
                    </div>
                </div>
            `;
            
            const qR = query(collection(db, `artifacts/${appId}/public/data/requests`), orderBy("createdAt", "desc"));
            const unsubR = onSnapshot(qR, (snap) => {
                const reqs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                
                // Chart logic
                const labels = CEBU_LOCATIONS.cities.concat(CEBU_LOCATIONS.municipalities);
                const data = labels.map(l => reqs.filter(r => r.barangay === l).length);
                const ctx = document.getElementById('adminChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: { labels, datasets: [{ label: 'Request Count', data, backgroundColor: '#3b82f6', borderRadius: 8 }] },
                    options: { scales: { y: { beginAtZero: true } }, plugins: { legend: { display: false } } }
                });

                document.getElementById('admin-approvals').innerHTML = reqs.filter(r => r.status === 'pending').map(r => `
                    <div class="flex items-center justify-between p-4 bg-slate-50 rounded-2xl">
                        <div><p class="font-bold text-sm">${r.barangay}</p><p class="text-xs text-slate-500">${r.items}</p></div>
                        <button onclick="updateReq('${r.id}', 'approved')" class="bg-blue-600 text-white px-3 py-1 rounded-lg font-bold text-xs">Approve</button>
                    </div>
                `).join('') || '<p class="text-center py-10 text-slate-400 italic">No pending approvals</p>';
            });

            const qD = query(collection(db, `artifacts/${appId}/public/data/donations`), orderBy("createdAt", "desc"), limit(6));
            const unsubD = onSnapshot(qD, (snap) => {
                document.getElementById('admin-donations').innerHTML = snap.docs.map(d => {
                    const don = d.data();
                    return `
                        <div class="p-4 bg-white/5 border border-white/10 rounded-2xl">
                            <p class="text-blue-400 font-bold">${don.donorName}</p>
                            <p class="text-sm">${don.item} x${don.quantity}</p>
                        </div>
                    `;
                }).join('');
            });
            activeUnsubs.push(unsubR, unsubD);
        }

        function renderLogistics() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100">
                        <h4 class="font-bold mb-6 flex items-center gap-2"><i data-lucide="package" class="text-blue-500"></i> Dispatch Queue</h4>
                        <div id="logi-queue" class="space-y-4"></div>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100">
                        <h4 class="font-bold mb-6 flex items-center gap-2"><i data-lucide="truck" class="text-orange-500"></i> In Transit</h4>
                        <div id="logi-transit" class="space-y-4"></div>
                    </div>
                </div>
            `;
            const q = query(collection(db, `artifacts/${appId}/public/data/requests`), where("status", "in", ["approved", "dispatched"]));
            const unsub = onSnapshot(q, (snap) => {
                const reqs = snap.docs.map(d => ({id: d.id, ...d.data()}));
                document.getElementById('logi-queue').innerHTML = reqs.filter(r => r.status === 'approved').map(r => `
                    <div class="p-4 bg-slate-50 rounded-2xl">
                        <p class="font-bold">${r.barangay}</p><p class="text-sm text-slate-500 mb-3">${r.items}</p>
                        <button onclick="updateReq('${r.id}', 'dispatched')" class="w-full bg-blue-600 text-white py-2 rounded-xl font-bold text-xs">Dispatch Now</button>
                    </div>
                `).join('');
                document.getElementById('logi-transit').innerHTML = reqs.filter(r => r.status === 'dispatched').map(r => `
                    <div class="p-4 border border-orange-100 bg-orange-50 rounded-2xl">
                        <p class="font-bold">${r.barangay}</p><p class="text-sm text-slate-600">${r.items}</p>
                    </div>
                `).join('');
            });
            activeUnsubs.push(unsub);
            lucide.createIcons();
        }

        function renderDonor() {
            const container = document.getElementById('dashboard-content');
            container.innerHTML = `
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-[2rem] border border-slate-100 h-fit">
                        <h4 class="font-bold mb-4">Pledge a Donation</h4>
                        <div class="space-y-4">
                            <input id="don-item" placeholder="Relief Item (e.g. Rice)" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none">
                            <input id="don-qty" type="number" placeholder="Quantity" class="w-full p-3 rounded-xl bg-slate-50 border border-slate-200 outline-none">
                            <button onclick="submitDonation()" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-orange-100">Submit Pledge</button>
                        </div>
                    </div>
                    <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] border border-slate-100">
                        <h4 class="font-bold mb-4">Your Contribution History</h4>
                        <div id="donor-history" class="space-y-3"></div>
                    </div>
                </div>
            `;
            const q = query(collection(db, `artifacts/${appId}/public/data/donations`), where("donorId", "==", currentUser.uid));
            const unsub = onSnapshot(q, (snap) => {
                document.getElementById('donor-history').innerHTML = snap.docs.map(d => {
                    const don = d.data();
                    return `<div class="p-4 bg-slate-50 rounded-2xl flex justify-between">
                        <p class="font-bold">${don.item} x${don.quantity}</p>
                        <p class="text-xs text-slate-400">${don.createdAt ? new Date(don.createdAt.seconds*1000).toLocaleDateString() : 'Pending'}</p>
                    </div>`;
                }).join('') || '<p class="text-center py-10 text-slate-300">No donations yet</p>';
            });
            activeUnsubs.push(unsub);
        }

        window.submitDonation = async () => {
            const item = document.getElementById('don-item').value;
            const quantity = document.getElementById('don-qty').value;
            if (!item || !quantity) return;
            await addDoc(collection(db, `artifacts/${appId}/public/data/donations`), {
                donorId: currentUser.uid, donorName: currentUserData.name, item, quantity, createdAt: serverTimestamp()
            });
            document.getElementById('don-item').value = '';
            document.getElementById('don-qty').value = '';
        };

        // --- MAP MODAL ---

        window.openMap = () => {
            const modal = document.getElementById('modal-container');
            const allLocations = [...CEBU_LOCATIONS.cities, ...CEBU_LOCATIONS.municipalities];
            
            modal.innerHTML = `
                <div class="flex items-center justify-center min-h-screen p-4 bg-slate-900/80 backdrop-blur-sm">
                    <div class="bg-white w-full max-w-4xl rounded-[2.5rem] p-10 overflow-hidden relative">
                        <button onclick="closeModal()" class="absolute top-6 right-6 p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
                        <div class="flex flex-col md:flex-row gap-10">
                            <div class="flex-1">
                                <h3 class="text-2xl font-black mb-2">Cebu Relief Radar</h3>
                                <p class="text-slate-500 mb-8">Real-time emergency heat-map</p>
                                <div class="grid grid-cols-2 gap-4" id="map-grid"></div>
                            </div>
                            <div class="w-full md:w-64 space-y-4">
                                <div class="p-4 bg-blue-50 text-blue-700 rounded-2xl text-xs font-bold leading-relaxed">
                                    Red nodes indicate active, unfulfilled relief requests in that specific city or municipality.
                                </div>
                                <div class="p-4 bg-slate-900 text-white rounded-2xl">
                                    <p class="text-[10px] font-black uppercase tracking-widest mb-2 opacity-50">Active Stats</p>
                                    <p class="text-2xl font-black">${publicRequests.length}</p>
                                    <p class="text-xs opacity-70">Total Pending Requests</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('map-grid').innerHTML = allLocations.map(l => {
                const count = publicRequests.filter(r => r.barangay === l).length;
                return `
                    <div class="p-3 border ${count > 0 ? 'bg-red-50 border-red-200 animate-pulse' : 'bg-white border-slate-100'} rounded-2xl">
                        <div class="w-2 h-2 rounded-full mb-1 ${count > 0 ? 'bg-red-500' : 'bg-emerald-500'}"></div>
                        <p class="text-[10px] font-bold uppercase truncate">${l}</p>
                        ${count > 0 ? `<p class="text-[10px] font-black text-red-600">${count} Requests</p>` : ''}
                    </div>
                `;
            }).join('');
            
            modal.classList.remove('hide');
            lucide.createIcons();
        };

        window.closeModal = () => {
            document.getElementById('modal-container').classList.add('hide');
        };

        window.navigateTo = navigateTo;
        
        // Start App
        init();
    </script>
</body>
</html>
